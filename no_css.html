		function updateCalendar(month, year, events) {
		    let firstDay = (new Date(year, month)).getDay();
		    firstDay = (firstDay === 0) ? 6 : firstDay - 1; // Adjust to make Monday the first day
		    let daysInMonth = 32 - new Date(year, month, 32).getDate();
		    monthAndYearDisplay.innerHTML = months[month] + " " + year;
		    let tbl = document.querySelector("tbody");
		    tbl.innerHTML = "";
		    let date = 1;
		    let numEvents = 0;

			let eventList = document.querySelector(".eventList");
			eventList.innerHTML = "";

		    for (let i = 0; i < 6; i++) {
		        let row = document.createElement("tr");
		        let isRowEmpty = true;
		        for (let j = 0; j < 7; j++) {
		            if (i === 0 && j < firstDay) {
		                let cell = document.createElement("td");
		                let cellText = document.createTextNode("");
		                cell.appendChild(cellText);
		                row.appendChild(cell);
		            } else if (date > daysInMonth) {
		                let cell = document.createElement("td");
		                let cellText = document.createTextNode("");
		                cell.appendChild(cellText);
		                row.appendChild(cell);
		            } else {
		                let cell = document.createElement("td");
		                let cellText = document.createTextNode(date);

		                // Check if there are any events on this day
		                let monthStr = (month + 1).toString().padStart(2, '0'); // Convert month to one-indexed string with leading zero
		                let dateStr = date.toString().padStart(2, '0'); // Convert date to string with leading zero if necessary

		                if (events[year] && events[year][monthStr] && events[year][monthStr][dateStr]) {
		                    let dayEvents = events[year][monthStr][dateStr];
							dayEvents = Object.values(dayEvents);

							let buttonDate = date;

							cell.addEventListener("click", function() {
							    // Clear data-events-generated for all event days
							    let eventDays = document.querySelectorAll(".eventDay");
							    eventDays.forEach(function(eventDay) {
							        delete eventDay.dataset.eventsGenerated;
							    });

							    // Clear the event list
							    eventList.innerHTML = "";

							    let h3 = document.createElement("h2");
							    h3.appendChild(document.createTextNode(buttonDate + " " + months[month] + " " + year));
								let p = document.createElement("p");
								p.appendChild(document.createTextNode("Tryck på en händelse för att läsa mer:"));
							    eventList.appendChild(h3);
								eventList.appendChild(p);
							    let eventsDiv = document.createElement("section");
							    eventsDiv.classList.add("events");
							    for (let i = 0; i < dayEvents.length; i++) {
							        let eventID = dayEvents[i];
							        let event = events["Events"][eventID];
							        let a = document.createElement("a");
							        a.classList.add("event");
							        a.href = event.link;
							        a.target = "_parent"; // Ensure the link opens in the parent window
							        a.style.backgroundColor = event.lightColor;
							        let h4 = document.createElement("h3");
							        h4.appendChild(document.createTextNode(event.name));
							        a.appendChild(h4);
							        let p = document.createElement("p");
							        p.appendChild(document.createTextNode(event.description));
							        a.appendChild(p);
							        let span = document.createElement("span");
							        span.classList.add("arrow");
							        span.appendChild(document.createTextNode("→"));
							        a.appendChild(span);
							        eventsDiv.appendChild(a);
							    }
							    eventList.appendChild(eventsDiv);

							    // Scroll the event list into view with offset for fixed navigation bar
							    let offset = 100; // Height of the fixed navigation bar
							    let elementPosition = eventList.getBoundingClientRect().top;
							    let offsetPosition = elementPosition - offset;

							    window.parent.scrollTo({
							        top: elementPosition,
							        behavior: "smooth"
							    });
							});

							cell.classList.add("eventDay");
							numEvents += dayEvents.length;
							let colors = dayEvents.map(function(eventID) {
							    return events["Events"][eventID].color;
							});

							if (colors.length > 1) {
							    cell.style.backgroundColor = "black";
							    cell.style.color = "white";
							} else {
							    cell.style.backgroundColor = colors[0];
							}

		                } else {
		                    cell.classList.add("emptyDay");
		                    cellText = document.createTextNode(date);
		                }

		                cell.appendChild(cellText);
		                row.appendChild(cell);
		                date++;
		                isRowEmpty = false;
		            }
		        }
		        if (!isRowEmpty) {
		            tbl.appendChild(row);
		        }
		    }

			/*
		    if (numEvents > 0) {
		        console.log("Events: " + numEvents);
		        nextEvent.style.display = "none";
		    } else {
		        let nextMonthWithEvents = findNextMonthWithEvents(month, year);
		        if (nextMonthWithEvents) {
		            nextEvent.removeEventListener("click", nextEventHandler); // Remove previous event listener
		            nextEventHandler = function() {

		            nextEvent.style.display = "inline";

			*/
		}

		let month;
		let year;
		let nextEventHandler;

		window.onload = function() {
		    fetch("days.json")
		        .then(response => response.json())
		        .then(data => {
		            events = data;
		            console.log(events);

		            date = new Date();
		            month = date.getMonth();
		            year = date.getFullYear();
		            months = ["Januari", "Februari", "Mars", "April", "Maj", "Juni", "Juli", "Augusti", "September", "Oktober", "November", "December"];
		            monthAndYearDisplay = document.querySelector(".month");

		            updateCalendar(month, year, events);

					let prevMonth = document.getElementById("prevMonth");
					let nextMonth = document.getElementById("nextMonth");

					prevMonth.addEventListener("click", function() {
						month--;
						if (month < 0) {
							month = 11;
							year--;
						}
						updateCalendar(month, year, events);
					});

					nextMonth.addEventListener("click", function() {
						month++;
						if (month > 11) {
							month = 0;
							year++;
						}
						updateCalendar(month, year, events);
					});
		        })
		        .catch(error => {
		            console.error(error);
		        });
		}
	</script>

<body>
	<table>
		<thead>
			<tr>
				<th class="calHead" colspan="7">
					<section>
						<button id="prevMonth">
							&larr;
						</button>
						<span class="month"></span>
						<div>
							<!-- <button id="nextEvent">
								Nästa händelse
								&rarr;
							</button> -->
							<button id="nextMonth">

							</button>
						</div>
					</section>
				</th>

				<th>T</th>
